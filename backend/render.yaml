services:
    - type: web
      name: inventory-reminder-backend
      env: node
      buildCommand: npm install
      startCommand: node src/server.js
      envVars:
          - key: DATABASE_URL
            sync: false
          - key: JWT_SECRET
            sync: false
          - key: VAPID_PUBLIC_KEY
            sync: false
          - key: VAPID_PRIVATE_KEY
            sync: false
